services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: support-agent-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/faiss_index:/app/backend/faiss_index
      - ./backend/knowledge_base:/app/backend/knowledge_base
      - ./backend/agent_config.json:/app/backend/agent_config.json
      - ./backend/logs:/app/backend/logs
    restart: unless-stopped
    develop:
      watch:
        - path: backend
          action: rebuild
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: support-agent-frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./backend/logs:/app/backend/logs
    restart: unless-stopped
    develop:
      watch:
        - path: frontend
          action: rebuild
    depends_on:
      - backend
